spring:
  application:
    name: staracademybackend
  data:
    mongodb:
      uri: ${MONGODB_URI}
  servlet:
    multipart:
      max-file-size: -1
      max-request-size: -1

server:
  port: ${PORT:8080}

aws:
  s3:
    bucket-name: ${AWS_S3_BUCKET}
    region: ${AWS_REGION}
  access-key: ${AWS_ACCESS_KEY}
  secret-key: ${AWS_SECRET_KEY}

security:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000

admin:
  username: ${ADMIN_USERNAME}
  password: ${ADMIN_PASSWORD}
